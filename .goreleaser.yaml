version: 2

project_name: termtype

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - id: termtype
    main: .
    binary: termtype
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    builds:
      - termtype
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

release:
  github:
    owner: vyeos
    name: gotap
